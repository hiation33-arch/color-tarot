<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컬러 타로</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{padding:2rem 1.25rem;max-width:480px;margin:0 auto;background:#ffffff;min-height:100vh}
.subtitle{font-size:11px;font-weight:500;letter-spacing:0.18em;color:#aaa;text-align:center;text-transform:uppercase;margin-bottom:0.5rem}
.title{font-size:21px;font-weight:500;color:#1a1a1a;text-align:center;margin-bottom:0.25rem;letter-spacing:0.03em}
.divider{width:32px;height:1px;background:#e0e0e0;margin:0.75rem auto 1.25rem}
#step1-label{font-size:13px;color:#999;text-align:center;margin-bottom:1.25rem}
#step1-label strong{color:#555;font-weight:500}
#cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.card{border-radius:10px;aspect-ratio:2/3;cursor:pointer;border:2px solid transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform 0.13s ease,box-shadow 0.13s ease}
.card.pressing{transform:scale(1.07);box-shadow:0 10px 28px rgba(0,0,0,0.2)}
.card.selected{border:2.5px solid #fff;box-shadow:0 0 0 3px rgba(0,0,0,0.15),0 6px 20px rgba(0,0,0,0.15)}
#select-btn{display:none;width:100%;padding:0.8rem;font-size:12px;font-weight:500;letter-spacing:0.1em;border-radius:8px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;margin-top:0.25rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:opacity 0.2s,transform 0.1s}
#select-btn:disabled{background:#ebebeb;color:#bbb;cursor:default}
#select-btn:not(:disabled):active{transform:scale(0.98)}
#step2{display:none;margin-top:0.5rem}
#step2-label{font-size:13px;color:#999;text-align:center;margin-bottom:1.25rem}
#step2-label strong{color:#555;font-weight:500}
#final-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.final-card{border-radius:8px;aspect-ratio:2/3;cursor:pointer;border:2px solid transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform 0.13s ease,box-shadow 0.13s ease}
.final-card.pressing{transform:scale(1.1);box-shadow:0 10px 28px rgba(0,0,0,0.25)}
#result{display:none;margin-top:1.5rem;border-radius:14px;padding:2rem 1.5rem;animation:fadeUp 0.5s ease}
#result-name{font-size:11px;font-weight:500;letter-spacing:0.22em;margin-bottom:0.55rem;opacity:0.72;text-transform:uppercase}
#result-keywords{font-size:12px;margin-bottom:1.2rem;opacity:0.62;letter-spacing:0.04em}
#result-divider{width:22px;height:1px;margin-bottom:1.2rem;opacity:0.35}
#result-msg{font-size:17px;font-weight:500;line-height:1.75;letter-spacing:0.01em}
#restart{display:none;width:100%;padding:0.65rem;font-size:12px;font-weight:500;letter-spacing:0.08em;color:#aaa;background:#fff;border:0.5px solid #e8e8e8;border-radius:8px;cursor:pointer;margin-top:1rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="subtitle">Color Tarot</div>
  <div class="title">오늘 나를 움직이게 할 것은?</div>
  <div class="divider"></div>
  <div id="step1-label">마음에 끌리는 색을 <strong>5장</strong> 골라주세요</div>
  <div id="cards-grid"></div>
  <button id="select-btn" disabled>다음 단계로</button>
  <div id="step2">
    <div id="step2-label">이 중에서 오늘의 색을 <strong>하나</strong> 고르세요</div>
    <div id="final-grid"></div>
  </div>
  <div id="result">
    <div id="result-name"></div>
    <div id="result-keywords"></div>
    <div id="result-divider"></div>
    <div id="result-msg"></div>
  </div>
  <button id="restart">↺ 다시 뽑기</button>
</div>
<script>
const COLORS=[
  {name:"RED",hex:"#B5392A",keywords:"열정 · 추진력 · 긴장",msg:"움직이고 싶은 마음이 이미 답을 알고 있어요."},
  {name:"ORANGE",hex:"#D4621E",keywords:"활력 · 사교성 · 창의",msg:"오늘의 에너지는 연결에서 옵니다."},
  {name:"YELLOW",hex:"#D4A017",keywords:"지성 · 호기심 · 낙관",msg:"질문하는 사람이 가장 멀리 가요."},
  {name:"GREEN",hex:"#3A7D44",keywords:"균형 · 성장 · 안정",msg:"서두르지 않아도 잘 하고 있어요."},
  {name:"BLUE",hex:"#2B6CB0",keywords:"신뢰 · 차분함 · 소통",msg:"말하지 않은 것 안에 오늘의 실마리가 있어요."},
  {name:"TURQUOISE",hex:"#2A9D8F",keywords:"조화 · 치유 · 평화",msg:"지금 이 자리에서 충분히 쉬어도 괜찮아요."},
  {name:"PURPLE",hex:"#6B3FA0",keywords:"신비 · 창조 · 영감",msg:"아직 이름 붙이지 못한 가능성이 있어요."},
  {name:"PINK",hex:"#C2637A",keywords:"온화함 · 배려 · 감수성",msg:"나를 먼저 돌보는 것이 오늘의 출발점이에요."},
  {name:"BROWN",hex:"#7D5A3C",keywords:"안정 · 현실감 · 신중함",msg:"기초가 단단한 사람은 흔들려도 돌아와요."},
  {name:"WHITE",hex:"#EEECE6",keywords:"순수 · 새로운 시작 · 여백",msg:"비워야 채울 수 있어요. 오늘은 여백의 날이에요."},
  {name:"GRAY",hex:"#8A8C85",keywords:"중립 · 사색 · 과도기",msg:"지금은 답이 아니라 방향을 찾는 시간이에요."},
  {name:"BLACK",hex:"#2A2A28",keywords:"집중 · 경계 · 내면의 힘",msg:"모든 걸 끌어안을 준비가 된 사람의 색이에요."}
];

let selected=[],shuffled=[];

function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5)}
function getTextColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>145?"#1a1a1a":"#f5f5f0";
}

function addCardListeners(el, onTap){
  el.addEventListener('pointerdown', ()=>el.classList.add('pressing'));
  el.addEventListener('pointerup', (e)=>{
    el.classList.remove('pressing');
    onTap();
  });
  el.addEventListener('pointercancel', ()=>el.classList.remove('pressing'));
}

function init(){
  selected=[];shuffled=shuffle(COLORS);
  ['step2','result','restart'].forEach(id=>document.getElementById(id).style.display='none');
  const btn=document.getElementById('select-btn');
  btn.style.display='none';btn.disabled=true;
  document.getElementById('step1-label').style.display='block';
  const grid=document.getElementById('cards-grid');
  grid.innerHTML='';grid.style.display='grid';
  shuffled.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='card';
    el.style.background=c.hex;
    if(c.hex==='#EEECE6')el.style.border='1.5px solid #d8d6d0';
    addCardListeners(el, ()=>toggleCard(i,el));
    grid.appendChild(el);
  });
}

function toggleCard(i,el){
  if(selected.includes(i)){selected=selected.filter(x=>x!==i);el.classList.remove('selected')}
  else{if(selected.length>=5)return;selected.push(i);el.classList.add('selected')}
  const btn=document.getElementById('select-btn');
  btn.style.display='block';btn.disabled=selected.length!==5;
}

document.getElementById('select-btn').addEventListener('click',()=>{
  document.getElementById('cards-grid').style.display='none';
  document.getElementById('step1-label').style.display='none';
  document.getElementById('select-btn').style.display='none';
  document.getElementById('step2').style.display='block';
  const fg=document.getElementById('final-grid');
  fg.innerHTML='';
  selected.forEach(i=>{
    const c=shuffled[i];
    const el=document.createElement('div');
    el.className='final-card';
    el.style.background=c.hex;
    if(c.hex==='#EEECE6')el.style.border='1.5px solid #d8d6d0';
    addCardListeners(el, ()=>showResult(c));
    fg.appendChild(el);
  });
});

function showResult(c){
  document.getElementById('step2').style.display='none';
  const tc=getTextColor(c.hex);
  const res=document.getElementById('result');
  res.style.display='block';res.style.background=c.hex;
  document.getElementById('result-divider').style.background=tc;
  ['result-name','result-keywords','result-msg'].forEach(id=>{
    document.getElementById(id).style.color=tc;
  });
  document.getElementById('result-name').textContent=c.name;
  document.getElementById('result-keywords').textContent=c.keywords;
  document.getElementById('result-msg').textContent=c.msg;
  document.getElementById('restart').style.display='block';
}

document.getElementById('restart').addEventListener('click',init);
init();
</script>
</body>
</html>
